<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKI RANKING | KITAcore</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:    #E9E9E9;
  --ink:   #000000;
  --mid:   #333333;
  --muted: #999999;
  --line:  #CCCCCC;
  --white: #FFFFFF;
}
html { font-size: 10px; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans JP', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── 左上ナビ ── */
.nav-label {
  position: fixed;
  top: 28px; left: 32px; z-index: 100;
  font-size: 1rem; font-weight: 700;
  letter-spacing: .25em; text-transform: uppercase;
}

.page { max-width: 1040px; margin: 0 auto; padding: 0 40px 120px; }

/* ── ヘッダー ── */
.masthead { padding-top: 100px; padding-bottom: 48px; border-bottom: 2px solid var(--ink); }
.masthead-inner { display: grid; grid-template-columns: 1fr auto; align-items: flex-end; gap: 40px; }
.title-label { display: block; font-size: 1rem; font-weight: 700; letter-spacing: .3em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.main-title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: clamp(6rem,14vw,13rem); font-weight: 700; line-height: .88; letter-spacing: -.03em; text-transform: uppercase; }
.main-title .sub { display: block; font-weight: 300; font-size: .48em; letter-spacing: .12em; color: var(--mid); padding-left: .06em; }
.header-data { text-align: right; padding-bottom: 8px; }
.data-num { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 8rem; font-weight: 700; line-height: 1; letter-spacing: -.04em; color: var(--line); }
.data-label { font-size: .95rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.period-line { font-size: .9rem; font-weight: 400; letter-spacing: .1em; color: var(--mid); margin-top: 2px; }

/* ── タブ ── */
.tab-strip { display: flex; border-bottom: 1px solid var(--line); }
.tab-btn {
  background: none; border: none;
  padding: 20px 28px 18px;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 1rem; font-weight: 700; letter-spacing: .25em; text-transform: uppercase;
  color: var(--muted); cursor: pointer; position: relative; transition: color .18s;
}
.tab-btn::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--ink); transform: scaleX(0); transition: transform .2s cubic-bezier(.16,1,.3,1); transform-origin: left; }
.tab-btn:hover { color: var(--ink); }
.tab-btn.active { color: var(--ink); }
.tab-btn.active::after { transform: scaleX(1); }

/* ── TOP3 ── */
.podium { display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr; border-bottom: 1px solid var(--line); }
.podium-div { background: var(--line); }
.podium-cell {
  padding: 40px 32px 36px; position: relative; overflow: hidden;
  animation: slideIn .4s ease both; transition: background .2s;
}
.podium-cell:hover { background: rgba(0,0,0,.03); }
.podium-cell:nth-child(1) { animation-delay: 0ms; }
.podium-cell:nth-child(3) { animation-delay: 60ms; }
.podium-cell:nth-child(5) { animation-delay: 120ms; }
.podium-cell.r1 { background: var(--ink); }
.podium-cell.r1:hover { background: #111; }

.ghost-num { position: absolute; top: -8px; right: 16px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12rem; font-weight: 700; line-height: 1; letter-spacing: -.06em; color: rgba(0,0,0,.06); pointer-events: none; user-select: none; }
.r1 .ghost-num { color: rgba(255,255,255,.07); }

.cell-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--line); display: flex; align-items: center; justify-content: center; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--muted); margin-bottom: 12px; overflow: hidden; }
.r1 .cell-avatar { background: rgba(255,255,255,.15); color: rgba(255,255,255,.5); }
.cell-avatar img { width: 100%; height: 100%; object-fit: cover; }

.cell-badge-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.cell-badge { font-size: .85rem; font-weight: 700; letter-spacing: .3em; text-transform: uppercase; color: var(--muted); }
.r1 .cell-badge { color: rgba(255,255,255,.4); }

/* 🔥 streakバッジ */
.streak-badge { font-size: .85rem; font-weight: 700; letter-spacing: .05em; color: #cc4400; background: rgba(204,68,0,.1); padding: 2px 7px; border-radius: 3px; }
.r1 .streak-badge { color: #ff8844; background: rgba(255,136,68,.15); }

.cell-name { font-size: 1.3rem; font-weight: 700; line-height: 1.3; word-break: break-all; color: var(--ink); margin-bottom: 20px; }
.r1 .cell-name { color: var(--white); }
.cell-name a { color: inherit; text-decoration: none; }

.cell-score-row { display: flex; align-items: baseline; gap: 6px; }
.cell-score { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 4.8rem; font-weight: 700; letter-spacing: -.04em; line-height: 1; color: var(--ink); }
.r1 .cell-score { color: var(--white); }
.r2 .cell-score { color: var(--mid); }
.r3 .cell-score { color: #666; }
.cell-score-unit { font-size: .85rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
.r1 .cell-score-unit { color: rgba(255,255,255,.35); }
.cell-likes { font-size: .9rem; font-weight: 400; letter-spacing: .1em; color: var(--muted); margin-top: 6px; }
.r1 .cell-likes { color: rgba(255,255,255,.3); }

/* ── チャートセクション ── */
.chart-section { padding: 40px 0; border-bottom: 1px solid var(--line); }
.chart-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; }
.chart-title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: .25em; text-transform: uppercase; color: var(--mid); }
.chart-sub { font-size: .85rem; font-weight: 400; letter-spacing: .1em; color: var(--muted); }
.chart-wrap { position: relative; width: 100%; height: 220px; }
canvas#chart { width: 100%; height: 100%; }

/* ── 通常行 ── */
.rank-list { border-bottom: 1px solid var(--line); }
.rank-row {
  display: grid; grid-template-columns: 64px 48px 1fr 140px;
  align-items: center; border-top: 1px solid var(--line);
  animation: slideIn .35s ease both; transition: background .15s;
}
.rank-row:hover { background: rgba(0,0,0,.03); }
.row-num { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: .1em; color: var(--muted); text-align: center; padding: 20px 0; border-right: 1px solid var(--line); }
.row-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--line); display: flex; align-items: center; justify-content: center; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 1rem; font-weight: 700; color: var(--muted); margin: 0 auto; overflow: hidden; }
.row-avatar img { width: 100%; height: 100%; object-fit: cover; }
.row-info { padding: 16px 20px; min-width: 0; border-right: 1px solid var(--line); }
.row-name-wrap { display: flex; align-items: center; gap: 6px; }
.row-name { font-size: 1.2rem; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .02em; }
.row-name a { color: inherit; text-decoration: none; }
.row-name a:hover { color: var(--muted); }
.row-streak { font-size: .75rem; font-weight: 700; color: #cc4400; white-space: nowrap; flex-shrink: 0; }
.row-bar-outer { margin-top: 7px; height: 2px; background: var(--line); }
.row-bar-inner { height: 2px; background: var(--ink); width: 0; transition: width .9s cubic-bezier(.16,1,.3,1); }
.row-likes-lbl { margin-top: 5px; font-size: .85rem; font-weight: 400; letter-spacing: .08em; color: var(--muted); }
.row-score-block { text-align: right; padding: 16px 24px 16px 16px; }
.row-score-val { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 3rem; font-weight: 700; letter-spacing: -.03em; line-height: 1; color: var(--ink); }
.row-score-unit { font-size: .75rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }

/* ── 状態 ── */
.state-msg { padding: 80px 0; text-align: center; font-size: 1rem; font-weight: 700; letter-spacing: .3em; text-transform: uppercase; color: var(--muted); }

/* ── フッター ── */
.colophon { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; padding: 24px 0; border-top: 1px solid var(--line); }
.colophon span { font-size: .85rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }

@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 680px) {
  .page { padding: 0 20px 80px; }
  .nav-label { left: 20px; top: 20px; }
  .masthead { padding-top: 72px; }
  .masthead-inner { grid-template-columns: 1fr; gap: 16px; }
  .header-data { text-align: left; }
  .data-num { font-size: 5rem; }
  .podium { grid-template-columns: 1fr; }
  .podium-div { display: none; }
  .podium-cell { border-top: 1px solid var(--line); }
  .ghost-num { font-size: 8rem; }
  .rank-row { grid-template-columns: 48px 36px 1fr 90px; }
  .row-score-val { font-size: 2.4rem; }
  .tab-btn { padding: 16px 14px 14px; font-size: .85rem; }
}
</style>
</head>
<body>

<div class="nav-label">01. SKI RANKING</div>

<div class="page">
  <header class="masthead">
    <div class="masthead-inner">
      <div>
        <span class="title-label">KITAcore / Supporter Archive</span>
        <h1 class="main-title">SKI<span class="sub">Ranking</span></h1>
      </div>
      <div class="header-data">
        <div class="data-num" id="data-num">—</div>
        <div class="data-label">Supporters</div>
        <div class="period-line" id="period-line">——</div>
      </div>
    </div>
  </header>

  <nav class="tab-strip">
    <button class="tab-btn active" data-type="this_week">今週</button>
    <button class="tab-btn"        data-type="last_week">先週</button>
    <button class="tab-btn"        data-type="monthly">今月</button>
    <button class="tab-btn"        data-type="last_month">先月</button>
  </nav>

  <main id="content"><div class="state-msg">Loading</div></main>

  <footer class="colophon">
    <span id="gen-at">——</span>
    <span>Score = Σ ( Ski × Timing Point )</span>
  </footer>
</div>

<script>
const RANK_URL  = './data/ranking_ski.csv';
const TRACE_URL = './data/ranking_ski_trace.csv';

let rankData  = [];
let traceData = [];
let maxByType = {};
let chartInst = null;

// ── CSV パーサー ──
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^\uFEFF/,'').trim());
  return lines.slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    cols.push(cur.trim());
    const o = {}; headers.forEach((h,i) => o[h] = cols[i]??''); return o;
  });
}

function fmtD(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDShort(dateStr) {
  // "2026-03-16" → "3/16"
  const [,m,d] = dateStr.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
}

function initial(name) { return ([...(name||'?')].find(c=>c.trim()))||'?'; }

function avatarEl(row, cls) {
  const init = initial(row.creator_name);
  const urlname = row.creator_urlname||'';
  const imgUrl = urlname ? `https://assets.note.mu/img/notes/users/${urlname}.png` : '';
  if (imgUrl) return `<div class="${cls}"><img src="${imgUrl}" alt="${row.creator_name||''}" onerror="this.parentElement.textContent='${init}'"></div>`;
  return `<div class="${cls}">${init}</div>`;
}

function streakBadge(days, cls='streak-badge') {
  if (!days || parseInt(days) < 1) return '';
  return `<span class="${cls}">🔥 ${days}日連続</span>`;
}

// ── TOP3 ──
function renderPodium(rows) {
  const badges = ['01','02','03'], rCls = ['r1','r2','r3'];
  return `<div class="podium">` + rows.slice(0,3).map((r,i) => {
    const nameHtml = r.creator_url
      ? `<a href="${r.creator_url}" target="_blank" rel="noopener">${r.creator_name||'匿名'}</a>`
      : (r.creator_name||'匿名');
    const streak = parseInt(r.streak_days||0);
    return `
    <div class="podium-cell ${rCls[i]}" style="animation-delay:${i*60}ms">
      <div class="ghost-num">${r.rank}</div>
      ${avatarEl(r,'cell-avatar')}
      <div class="cell-badge-row">
        <span class="cell-badge">${badges[i]}</span>
        ${streak >= 1 ? `<span class="streak-badge">🔥 ${streak}日連続</span>` : ''}
      </div>
      <div class="cell-name">${nameHtml}</div>
      <div class="cell-score-row">
        <div class="cell-score">${r.score}</div>
        <div class="cell-score-unit">pt</div>
      </div>
      <div class="cell-likes">${r.likes_count} スキ</div>
    </div>${i<2?'<div class="podium-div"></div>':''}`;
  }).join('') + `</div>`;
}

// ── チャート ──
const CHART_COLORS = ['#000000','#555555','#888888','#AAAAAA','#CCCCCC'];

function renderChart(type) {
  const traces = traceData.filter(r => r.ranking_type === type);
  if (!traces.length) return '';

  // 日付リスト（ユニーク）
  const dates = [...new Set(traces.map(r => r.date))].sort();
  // ユーザーリスト（順番維持）
  const seen = new Set();
  const users = [];
  traces.forEach(r => { if (!seen.has(r.like_user_id)) { seen.add(r.like_user_id); users.push({ id: r.like_user_id, name: r.creator_name }); } });

  // データセット作成
  const datasets = users.map((u, i) => {
    const data = dates.map(d => {
      const row = traces.find(r => r.like_user_id === u.id && r.date === d);
      return row ? parseInt(row.score_cumulative||0) : null;
    });
    return {
      label: u.name,
      data,
      borderColor: CHART_COLORS[i % CHART_COLORS.length],
      backgroundColor: 'transparent',
      borderWidth: i === 0 ? 2 : 1,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.3,
      spanGaps: true,
    };
  });

  return `
  <div class="chart-section">
    <div class="chart-header">
      <span class="chart-title">Score Trend</span>
      <span class="chart-sub">Top ${users.length} supporters</span>
    </div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </div>`;
}

function drawChart(type) {
  const canvas = document.getElementById('chart');
  if (!canvas) return;

  const traces = traceData.filter(r => r.ranking_type === type);
  if (!traces.length) return;

  const dates = [...new Set(traces.map(r => r.date))].sort();
  const seen = new Set(); const users = [];
  traces.forEach(r => { if (!seen.has(r.like_user_id)) { seen.add(r.like_user_id); users.push({ id: r.like_user_id, name: r.creator_name }); } });

  const datasets = users.map((u,i) => ({
    label: u.name,
    data: dates.map(d => {
      const row = traces.find(r => r.like_user_id === u.id && r.date === d);
      return row ? parseInt(row.score_cumulative||0) : null;
    }),
    borderColor: CHART_COLORS[i % CHART_COLORS.length],
    backgroundColor: 'transparent',
    borderWidth: i === 0 ? 2.5 : 1,
    pointRadius: 0,
    pointHoverRadius: 4,
    tension: 0.3,
    spanGaps: true,
  }));

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  chartInst = new Chart(canvas, {
    type: 'line',
    data: { labels: dates.map(fmtDShort), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { family: "'Helvetica Neue', Helvetica, Arial, sans-serif", size: 10, weight: '700' },
            color: '#999',
            boxWidth: 12,
            padding: 12,
          }
        },
        tooltip: {
          backgroundColor: '#000',
          titleFont: { size: 10 },
          bodyFont: { size: 11, weight: '700' },
          padding: 10,
        }
      },
      scales: {
        x: {
          grid: { color: '#E0E0E0', lineWidth: 1 },
          ticks: { font: { family: "'Helvetica Neue', Helvetica, Arial, sans-serif", size: 9 }, color: '#999', maxTicksLimit: 8 },
          border: { color: '#CCC' }
        },
        y: {
          grid: { color: '#E0E0E0', lineWidth: 1 },
          ticks: { font: { family: "'Helvetica Neue', Helvetica, Arial, sans-serif", size: 9 }, color: '#999' },
          border: { color: '#CCC' }
        }
      }
    }
  });
}

// ── 通常行 ──
function renderList(rows, maxScore) {
  if (rows.length <= 3) return '';
  return `<div class="rank-list">` + rows.slice(3).map((r,i) => {
    const pct = maxScore > 0 ? Math.round((parseInt(r.score)||0)/maxScore*100) : 0;
    const nameHtml = r.creator_url
      ? `<a href="${r.creator_url}" target="_blank" rel="noopener">${r.creator_name||'匿名'}</a>`
      : (r.creator_name||'匿名');
    const streak = parseInt(r.streak_days||0);
    return `
    <div class="rank-row" style="animation-delay:${i*20}ms" data-pct="${pct}">
      <div class="row-num">${r.rank}</div>
      ${avatarEl(r,'row-avatar')}
      <div class="row-info">
        <div class="row-name-wrap">
          <div class="row-name">${nameHtml}</div>
          ${streak >= 1 ? `<span class="row-streak">🔥${streak}日</span>` : ''}
        </div>
        <div class="row-bar-outer"><div class="row-bar-inner"></div></div>
        <div class="row-likes-lbl">${r.likes_count} スキ</div>
      </div>
      <div class="row-score-block">
        <div class="row-score-val">${r.score}</div>
        <div class="row-score-unit">pt</div>
      </div>
    </div>`;
  }).join('') + `</div>`;
}

function animateBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.rank-row').forEach(row => {
      const bar = row.querySelector('.row-bar-inner');
      if (bar) setTimeout(() => { bar.style.width = (row.dataset.pct||0)+'%'; }, 120);
    });
  });
}

// ── レンダリング ──
function render(type) {
  const rows = rankData.filter(r => r.ranking_type === type);
  document.getElementById('data-num').textContent = rows.length || '—';
  const r0 = rows[0];
  document.getElementById('period-line').textContent = r0
    ? `${fmtD(r0.period_start)} — ${fmtD(r0.period_end)}` : '——';

  const content = document.getElementById('content');
  if (!rows.length) { content.innerHTML = '<div class="state-msg">No Data</div>'; return; }

  const maxScore = maxByType[type] || 1;
  const chartHtml = renderChart(type);
  content.innerHTML = renderPodium(rows) + chartHtml + renderList(rows, maxScore);

  animateBars();
  // Chart.jsが読み込まれてからチャートを描画
  if (window.Chart) {
    drawChart(type);
  }
}

// ── タブ切り替え ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.type);
  });
});

// ── Chart.js 動的ロード ──
function loadChartJS(cb) {
  if (window.Chart) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
  s.onload = cb;
  document.head.appendChild(s);
}

// ── データ読み込み ──
Promise.all([
  fetch(RANK_URL).then(r => { if(!r.ok) throw new Error(`ranking: HTTP ${r.status}`); return r.text(); }),
  fetch(TRACE_URL).then(r => { if(!r.ok) throw new Error(`trace: HTTP ${r.status}`); return r.text(); }).catch(() => ''),
]).then(([rankText, traceText]) => {
  rankData  = parseCSV(rankText);
  traceData = traceText ? parseCSV(traceText) : [];

  ['this_week','last_week','monthly','last_month'].forEach(type => {
    const rows = rankData.filter(r => r.ranking_type === type);
    maxByType[type] = rows.reduce((m,r) => Math.max(m, parseInt(r.score)||0), 1);
  });

  const s = rankData.find(r => r.generated_at);
  if (s) {
    const d = new Date(s.generated_at);
    document.getElementById('gen-at').textContent =
      `Updated ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  loadChartJS(() => render('this_week'));
}).catch(err => {
  document.getElementById('content').innerHTML = `<div class="state-msg">Error: ${err.message}</div>`;
});
</script>
